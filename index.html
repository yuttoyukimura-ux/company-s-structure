<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経営シミュレーション - これからの企業はどうあるべきか？</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #2c3e50;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            background-color: #fdfdfd;
            max-width: 700px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            padding: 30px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5em;
            color: #2980b9;
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid #bdc3c7;
            padding-bottom: 10px;
        }
        .param-board {
            display: flex;
            justify-content: space-between;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .param {
            width: 30%;
            text-align: center;
            font-weight: bold;
        }
        .param-bar {
            height: 10px;
            background-color: #bdc3c7;
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }
        .param-fill {
            height: 100%;
            transition: width 0.5s ease-in-out;
        }
        #bar-funds { background-color: #f1c40f; }
        #bar-share { background-color: #e74c3c; }
        #bar-trust { background-color: #2ecc71; }
        
        .phase-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #8e44ad;
            margin-bottom: 10px;
        }
        .story-text {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .term {
            color: #c0392b;
            font-weight: bold;
            background-color: #fadbd8;
            padding: 0 4px;
            border-radius: 3px;
        }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .choice-btn {
            background-color: #34495e;
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 1.05em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: left;
        }
        .choice-btn:hover { background-color: #2c3e50; }
        
        #result-area {
            display: none;
            background-color: #e8f8f5;
            border-left: 6px solid #1abc9c;
            padding: 20px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.1em;
            line-height: 1.8;
        }
        .action-btn {
            display: none;
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
        }
        .action-btn:hover { background-color: #2471a3; }
        #game-over { display: none; text-align: center; color: #c0392b; margin-top: 20px; font-weight: bold; font-size: 1.2em;}
    </style>
</head>
<body>

<div id="game-container">
    <h1>企業ライフサイクル：究極の選択</h1>
    
    <div class="param-board">
        <div class="param">
            資金 (Funds)
            <div class="param-bar"><div id="bar-funds" class="param-fill" style="width: 50%;"></div></div>
        </div>
        <div class="param">
            シェア (Share)
            <div class="param-bar"><div id="bar-share" class="param-fill" style="width: 30%;"></div></div>
        </div>
        <div class="param">
            信用 (Trust)
            <div class="param-bar"><div id="bar-trust" class="param-fill" style="width: 50%;"></div></div>
        </div>
    </div>

    <div id="phase-title" class="phase-title"></div>
    <div id="story-area" class="story-text"></div>
    <div id="choices-area" class="choices"></div>
    
    <div id="result-area"></div>
    <button id="next-btn" class="action-btn" onclick="nextPhase()">次のフェーズへ</button>
    <div id="game-over">いずれかのパラメーターがゼロになり、経営破綻しました…。リロードして再挑戦してください。</div>
</div>

<script>
    // パラメーター初期値
    let params = { funds: 50, share: 30, trust: 50 };

    const scenarios = [
        {
            // ▼修正①：生産財の定義を教科書❹注釈に準拠。「企業が生産する際に用いる財」と明記。
            //   消費財の例も「食料・衣料」など誤解のないものに変更。
            title: "Phase 0: 起業前夜（ターゲット選定）",
            story: "あなたは起業を考えている。ビジネスの基本は、<span class='term'>経済主体</span>（家計・企業・政府）の間を巡るお金の流れを掴み、<span class='term'>利潤</span>を生み出すことだ。まずはターゲットを決めよう。",
            choices: [
                {
                    text: "A: 一般の消費者に向けた商品を作る",
                    effect: { funds: -10, share: +20, trust: 0 },
                    // 旧：「スマホや食品など」→ スマホは生産財にもなりうるため削除。教科書の例示「食料や衣料など」に準拠。
                    result: "一般の<span class='term'>家計</span>に向けて、彼らが日々の生活で使うための<span class='term'>消費財</span>（食料・衣料など）を作ることにした。広く認知されやすいが、消費者の財布の紐に大きく左右される。"
                },
                {
                    text: "B: 他の企業に向けた商品を作る",
                    effect: { funds: +10, share: -10, trust: +10 },
                    // 教科書❹：生産財＝「企業が生産する際に用いる財」（例：自動車生産の場合の部品）に準拠。
                    result: "他の企業に向けて、企業が生産する際に用いる<span class='term'>生産財</span>（部品・機械など）を作ることにした。地味だが安定した手堅いビジネスモデルだ。"
                }
            ]
        },
        {
            title: "Phase 0.5: マクロ経済の波を読む",
            // ▼修正②：所得効果・資産効果・逆資産効果を教科書の定義に厳密に準拠させる。
            //   教科書p.90：「消費は所得が増えると増加し（所得効果）」
            //   「資産価格が上がると増える傾向がある。これを資産効果という」
            //   「逆の効果（逆資産効果）が働き、消費が減った」
            story: "いよいよ事業開始だ。国や自治体が整備した道路や港湾などの<span class='term'>社会資本</span>を活用して物流コストを抑えよう。しかし世間では、税金や社会保険料を引いた手取りである<span class='term'>可処分所得</span>が伸び悩み、生活費に占める食費の割合を示す<span class='term'>エンゲル係数</span>が上昇しているというニュースが出ている。どうする？",
            choices: [
                {
                    text: "A: 不景気に備え、低価格で生活に必須な製品路線で行く",
                    effect: { funds: +10, share: 0, trust: +10 },
                    // 旧：「逆資産効果もあり」→ 株価下落局面での逆資産効果（資産価格下落→消費減少）の文脈を正確に。
                    //   旧文は「所得効果」と「逆資産効果」を混在させていたため分離して整理。
                    result: "株や土地などの資産価格が下落すると消費が減少する<span class='term'>逆資産効果</span>が働き、人々は支出を切り詰め、お得で必需品の商品を求め始めていた。低価格路線が見事に当たり、手堅く資金を確保した！"
                },
                {
                    text: "B: 好景気を信じ、高価格なプレミアム製品で勝負に出る",
                    effect: { funds: -20, share: +20, trust: 0 },
                    // 旧：「実質的な収入増による所得効果」→ 教科書では所得効果は「所得が増えると消費が増加する」こと。
                    //   また資産効果は「株式や土地などの資産価格が上がると消費が増える傾向」（教科書p.90）に準拠。
                    result: "所得が増えると消費も増える<span class='term'>所得効果</span>や、株・土地などの資産価格が上がると消費が増える<span class='term'>資産効果</span>に賭けた！一部の富裕層の心を見事に掴んでシェアは伸びた。しかし大衆には届かず資金繰りは少し苦しくなった。"
                }
            ]
        },
        {
            title: "Phase 1: 創業（どんな会社を作る？）",
            story: "国や自治体の<span class='term'>公企業</span>ではなく、民間人が出資する<span class='term'>私企業</span>を立ち上げる。事業を行うため、法律上の権利義務の主体となる<span class='term'>法人企業</span>にしたい。どんな形態を選ぶべきか？",
            choices: [
                {
                    text: "A: 身内だけで出資し、経営の自由度が高い形態にする",
                    effect: { funds: -10, share: 0, trust: -10 },
                    // ▼修正③：教科書p.92 表4「会社企業の種類」に準拠。
                    //   合名会社：出資者＝経営者＝無限責任社員。
                    //   合資会社：無限責任社員＋有限責任社員が出資・経営。
                    //   合同会社：出資者＝経営者＝有限責任社員（「広く定款による組織の運営を認め、かつ出資者が有限責任を負う」）。
                    //   旧文では合同会社を「身内で経営」とのみ記載していたが、有限責任社員が経営する点が最大の特徴のため修正。
                    result: "出資者が無限責任を負い自ら経営する<span class='term'>合名会社</span>、無限責任社員と有限責任社員が共同で出資・経営する<span class='term'>合資会社</span>、あるいは有限責任社員が出資と経営を兼ねる<span class='term'>合同会社</span>などの道を選んだ。小回りは利くが、大きな資金は集めにくい。"
                },
                {
                    text: "B: 広く資金を集め、大規模なビジネスを目指す",
                    effect: { funds: +20, share: +10, trust: +10 },
                    result: "<span class='term'>株式</span>を発行して広く資金を集める<span class='term'>株式会社</span>を選んだ！出資者である<span class='term'>株主</span>は、出資額以上の責任を負わない<span class='term'>有限責任</span>の原則に守られるため、お金が集まりやすい。"
                }
            ]
        },
        {
            title: "Phase 2: 経営体制の構築",
            story: "会社は順調に滑り出した。最高議決機関である<span class='term'>株主総会</span>が近づいている。事業をさらに加速させるため、会社の舵取りをどうするか？",
            // ▼修正④：教科書p.93「株主総会」の説明。
            //   旧：「最高意思決定機関」→ 教科書では「最高議決機関」と記載。修正。
            choices: [
                {
                    text: "A: 創業メンバー（出資者）だけで直接経営し続ける",
                    effect: { funds: 0, share: -10, trust: 0 },
                    result: "熱意はあるが、事業が巨大化するにつれて専門的な経営判断が難しくなり、成長スピードが落ちてきた。"
                },
                {
                    text: "B: 経営のプロフェッショナルを外部から招く",
                    effect: { funds: -10, share: +20, trust: +10 },
                    // 教科書p.93：「所有（資本）と経営の分離によって、経営の自律性が保たれる点が特徴」に準拠。
                    result: "株主（所有者）と経営者の役割を分ける<span class='term'>所有（資本）と経営の分離</span>を進めた！プロの判断により、事業は効率的に拡大し、経営の自律性も保たれた。"
                }
            ]
        },
        {
            title: "Phase 3: 勝負の資金調達",
            // ▼修正⑤：減価償却費の説明を教科書p.92に準拠。
            //   教科書：「設備を更新するために取っておかれる減価償却費」。
            //   旧：「機械の価値減少分である減価償却費」→ 教科書の表現に修正。
            //   内部金融の定義も教科書p.93「内部留保など企業内部から調達すること」に準拠。
            story: "ライバル企業に勝つため、画期的な新製品の<span class='term'>研究・開発（R&D）</span>と、工場への<span class='term'>設備投資</span>が必要だ。設備を更新するために積み立てる<span class='term'>減価償却</span>費や、これまでの利益の蓄積である<span class='term'>内部留保</span>といった<span class='term'>内部金融</span>だけでは資金が足りない！",
            choices: [
                {
                    text: "A: 銀行借入や社債の発行で資金を集める",
                    effect: { funds: +30, share: +20, trust: -10 },
                    // 教科書p.93：「社債を発行したり、金融機関から直接借り入れたりして資金を調達する場合は、将来、利子の支払いと元本の返済が必要」→ 他人資本の説明に準拠。
                    result: "企業外部から資金を調達する<span class='term'>外部金融</span>に踏み切った！将来の利子支払いと元本返済が必要な<span class='term'>他人資本</span>（銀行借入や<span class='term'>社債</span>）を増やして一気に勝負に出た。リスクはあるがシェアは拡大した！"
                },
                {
                    text: "B: 新たに株式を発行して資金を集める",
                    effect: { funds: +20, share: +10, trust: +10 },
                    // 教科書p.93：「株式を発行して資金調達する場合、出資金を株主に直接返金する必要はなく、配当は利潤があがったときのみ支払われる」→ 自己資本の説明に準拠。
                    result: "企業外部から資金を調達する<span class='term'>外部金融</span>のうち、出資金の返済義務がない<span class='term'>自己資本</span>（株式の増資）を選んだ。株主は企業経営に関与できる。経営の安全性は保たれたが、株主の数は増え、利益を求める声も強くなった。"
                }
            ]
        },
        {
            title: "Phase 4: 利益の分配",
            story: "新製品が大ヒットし、ついに会社に莫大な<span class='term'>利潤</span>（利益）が出た！<span class='term'>企業</span>の最大の目的である利益追求を達成した今、このお金をどう使う？",
            choices: [
                {
                    text: "A: 出資してくれた株主へ手厚く還元する",
                    effect: { funds: -20, share: 0, trust: +20 },
                    result: "利益の大半を<span class='term'>配当</span>として株主に支払った。投資家からの信頼は絶大になったが、次の戦いに向けた資金は減ってしまった。"
                },
                {
                    text: "B: 価格競争を仕掛け、さらに市場を支配する",
                    effect: { funds: -20, share: +30, trust: -10 },
                    // 教科書p.92：「市場占有率（マーケット・シェア）」の表記に準拠。
                    result: "利益をギリギリまで削って値下げ攻勢をかけ、業界の<span class='term'>市場占有率（マーケット・シェア）</span>を一気に奪い取った！しかし配当が減った株主からは不満が出ている。"
                }
            ]
        },
        {
            title: "Phase 5: 成熟期の事業再構築",
            story: "市場が成熟し、成長が鈍化してきた。生き残るためには事業の再構築（<span class='term'>リストラクチャリング</span>）が必要だ。どんな戦略をとる？",
            choices: [
                {
                    text: "A: 異業種の優れた企業を次々と買い取る",
                    effect: { funds: -30, share: +30, trust: 0 },
                    // 教科書p.94：「他企業の株式を買い占めて、その企業を合併・買収（M&A）する」「M&Aによって異なる産業に進出した企業は複合企業（コングロマリット）とよばれる」に準拠。
                    result: "他企業の株式を買い占めて<span class='term'>合併・買収（M&A）</span>を積極的に行い、異なる産業に進出した<span class='term'>複合企業（コングロマリット）</span>へと巨大化した！"
                },
                {
                    text: "B: 本業以外の業務を外部の専門業者に任せる",
                    effect: { funds: +20, share: -10, trust: 0 },
                    // 教科書p.94：「情報処理を専門会社に外注（アウトソーシング）するのもその一環」に準拠。
                    result: "自社でやらなくてもいい業務を専門会社に外注する<span class='term'>アウトソーシング</span>を実施し、徹底的なコスト削減に成功。資金に余裕が生まれた。"
                }
            ]
        },
        {
            title: "Phase 6: グローバル化と巨大組織の統括",
            // ▼修正⑥：株式持ち合いの文脈を教科書p.94に準拠して修正。
            //   教科書：「日本企業は企業間での株式持ち合いによって買収を防止しようとした」
            //   旧：「取引先と互いの株を持つ株式持ち合いで関係を強化している」→ 買収防止目的であることを明記。
            story: "ついに我が社は国境を越えて活動する<span class='term'>多国籍企業</span>となった！かつて日本企業は企業間で互いの株を保有する<span class='term'>株式持ち合い</span>によって買収を防止していたが、近年はその慣行も崩れてきた。世界中に散らばるグループ会社の管理が限界を迎えている。",
            choices: [
                {
                    text: "A: グループ全体を管理するためだけの「親会社」を作る",
                    effect: { funds: -10, share: +20, trust: +10 },
                    // 教科書p.94・p.95❼：「株式の保有によって他の企業を支配することが主たる業務である会社」「1997年に解禁」に準拠。
                    result: "株式の保有によって他の企業を支配・管理する<span class='term'>持株会社制度</span>（1997年解禁）を導入した！司令塔が明確になり、グループ全体の連携が強まった。"
                },
                {
                    text: "B: 各国の現地法人に完全に権限を委譲する",
                    effect: { funds: +10, share: +10, trust: -10 },
                    result: "現地の事情に合わせた素早い判断ができるようになったが、グループ全体の統一感がなくなり、リスク管理に不安が残る。"
                }
            ]
        },
        {
            title: "Phase 7: 不祥事とガバナンス",
            story: "大事件発生！海外の子会社で、違法な労働環境が発覚した。企業経営を外部から監視する仕組み（<span class='term'>コーポレート・ガバナンス（企業統治）</span>）と、組織内部を効率的に機能させる仕組み（<span class='term'>内部統制</span>）が機能していなかった。<span class='term'>法令遵守（コンプライアンス）</span>の重大な危機だ！",
            // ▼修正⑦：コーポレート・ガバナンスの定義を教科書p.95❽に準拠。
            //   教科書❽：「企業が不祥事を起こしたり、株主などの利益を損ねたりしないように企業経営を監視すること」。
            //   内部統制も教科書p.95「経営者、管理職と従業員の間で会社組織を効率的に機能させる、内部統制も含めた企業統治が求められる」に準拠。
            choices: [
                {
                    text: "A: すぐに第三者委員会を入れ、全容を世間に公表する",
                    effect: { funds: -30, share: -10, trust: +30 },
                    // 教科書p.94：「企業情報の開示（ディスクロージャー）を促し企業統治（コーポレート・ガバナンス）を強化」に準拠。
                    result: "多額の調査費用と賠償金を払い、投資家や社会へ包み隠さず<span class='term'>企業情報の開示（ディスクロージャー）</span>を行った。資金とシェアは失ったが、「嘘をつかない企業」として信用は回復した。"
                },
                {
                    text: "B: 法的に罰せられないギリギリの範囲で、内部だけで処理する",
                    effect: { funds: 0, share: 0, trust: -40 },
                    result: "資金の流出は防いだが、後からSNSで内部告発され大炎上！社会的な信用は地に堕ちた…。"
                }
            ]
        },
        {
            title: "Phase 8: 社会の一員として",
            story: "現代の企業は、ただ利益を出すだけでは存続できない。従業員、消費者、地域社会といったあらゆる関係者（<span class='term'>ステークホルダー</span>）に配慮し、<span class='term'>企業の社会的責任（CSR）</span>を果たすことが求められている。",
            choices: [
                {
                    text: "A: 本業の利益を使って、社会貢献活動を大々的に行う",
                    effect: { funds: -20, share: 0, trust: +30 },
                    // 教科書p.95：「芸術・文化の支援活動（メセナ）や福祉などに対する慈善活動（フィランソロピー）」に準拠。
                    result: "芸術・文化の支援活動である<span class='term'>メセナ</span>や、福祉などへの慈善活動である<span class='term'>フィランソロピー</span>に多額の支援を行った。地域社会からの絶大な支持を得た！"
                },
                {
                    text: "B: 社内の働き方を変革し、多様な人材が活躍できる会社にする",
                    effect: { funds: -10, share: +20, trust: +20 },
                    // 教科書p.95：「国籍・性別・年齢・宗教などが多様な人材を受け入れてダイバーシティを進めたりすることが、企業経営でも重要」に準拠。
                    result: "国籍・性別・年齢・宗教などにとらわれない<span class='term'>ダイバーシティ</span>（多様性）を推進した！多様な価値観から新しいアイデアが生まれ、結果的に業績も向上した。"
                }
            ]
        },
        {
            title: "Phase 9: 新たな挑戦（最終局面）",
            // ▼修正⑧：ソーシャルビジネスの定義を教科書p.95に準拠。
            //   教科書：「利潤追求よりも教育や環境、格差是正など社会貢献に資する事業（ソーシャルビジネス）を起こして社会問題の改善を図る社会起業家」に準拠。
            //   旧：「貧困や環境問題など、社会課題の解決を『目的』とした事業」→ 教科書の表現「社会貢献に資する事業」に統一。
            story: "幾多の困難を乗り越え、会社は安定した。あなたはCEOの座を後進に譲る決意をした。最後に、あなた自身のこれからの人生をどう生きるか？",
            choices: [
                {
                    text: "A: 悠々自適なリタイア生活を送る",
                    effect: { funds: +10, share: 0, trust: 0 },
                    result: "ビジネスの世界から身を引き、これまでの蓄えで静かに暮らす道を選んだ。あなたの企業家としての人生は幕を閉じた。"
                },
                {
                    text: "B: 社会貢献に資する事業を新たに始める",
                    effect: { funds: -20, share: 0, trust: +40 },
                    result: "利潤追求よりも教育や環境、格差是正など社会貢献に資する事業（<span class='term'>ソーシャルビジネス</span>）を新たに立ち上げ、あなたは<span class='term'>社会起業家</span>としての第二の人生を歩み始めた！"
                }
            ]
        }
    ];

    let currentPhase = 0;

    function updateBars() {
        document.getElementById('bar-funds').style.width = Math.min(Math.max(params.funds, 0), 100) + '%';
        document.getElementById('bar-share').style.width = Math.min(Math.max(params.share, 0), 100) + '%';
        document.getElementById('bar-trust').style.width = Math.min(Math.max(params.trust, 0), 100) + '%';
    }

    function checkGameOver() {
        if (params.funds <= 0 || params.share <= 0 || params.trust <= 0) {
            document.getElementById('choices-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('game-over').style.display = 'block';
            return true;
        }
        return false;
    }

    function renderPhase() {
        updateBars();
        if (checkGameOver()) return;

        const phaseData = scenarios[currentPhase];
        document.getElementById('phase-title').innerText = phaseData.title;
        document.getElementById('story-area').innerHTML = phaseData.story;
        
        const choicesArea = document.getElementById('choices-area');
        choicesArea.innerHTML = '';
        choicesArea.style.display = 'flex';
        
        phaseData.choices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => selectChoice(index, choice.effect, choice.result);
            choicesArea.appendChild(btn);
        });

        document.getElementById('result-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectChoice(index, effect, resultHTML) {
        params.funds += effect.funds;
        params.share += effect.share;
        params.trust += effect.trust;
        updateBars();

        const choices = document.querySelectorAll('.choice-btn');
        choices.forEach(btn => btn.style.display = 'none');

        const resultArea = document.getElementById('result-area');
        resultArea.innerHTML = "<strong>【決断の結果と用語確認】</strong><br>" + resultHTML + "<br><br><small>※ノートの赤字用語を埋めてから次へ進んでください。</small>";
        resultArea.style.display = 'block';

        if (!checkGameOver()) {
            const nextBtn = document.getElementById('next-btn');
            if (currentPhase < scenarios.length - 1) {
                nextBtn.innerText = "次のフェーズへ";
            } else {
                nextBtn.innerText = "ゲームクリア！学習課題へ";
            }
            nextBtn.style.display = 'block';
        }
    }

    function nextPhase() {
        if (currentPhase < scenarios.length - 1) {
            currentPhase++;
            renderPhase();
        } else {
            document.getElementById('story-area').innerHTML = "<strong>すべてのフェーズが完了しました！</strong><br>現在のパラメーター（資金・シェア・信用）のバランスを見てみましょう。あなたの会社は、どんな会社になりましたか？<br><br>では、この経験と埋めたノートの用語を使って、学習課題<strong>『これからの企業はどうあるべきか？』</strong>を自分の言葉で記述してください。";
            document.getElementById('phase-title').innerText = "Mission Complete";
            document.getElementById('choices-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }
    }

    // ゲーム開始
    renderPhase();
</script>
</body>
</html>
